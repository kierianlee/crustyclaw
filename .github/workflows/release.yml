name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml
        run: sed -i '0,/^version = ".*"/{s/^version = ".*"/version = "${{ steps.next.outputs.version }}"/}' Cargo.toml

      - name: Update plugin.json
        run: |
          jq '.version = "${{ steps.next.outputs.version }}"' plugin/.claude-plugin/plugin.json > tmp.json
          mv tmp.json plugin/.claude-plugin/plugin.json

      - name: Update marketplace.json
        run: |
          jq '(.plugins[] | select(.name == "crustyclaw")).version = "${{ steps.next.outputs.version }}"' .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json

      - name: Update web/package.json
        run: |
          jq '.version = "${{ steps.next.outputs.version }}"' web/package.json > tmp.json
          mv tmp.json web/package.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml plugin/.claude-plugin/plugin.json .claude-plugin/marketplace.json web/package.json
          git commit -m "release: v${{ steps.next.outputs.version }}"
          git tag "v${{ steps.next.outputs.version }}"
          git push origin main --tags

  build:
    needs: bump
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Build web frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --features openssl-vendored
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/crustyclaw dist/crustyclaw
          cd dist
          tar -czf crustyclaw-${{ matrix.target }}.tar.gz crustyclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crustyclaw-${{ matrix.target }}
          path: dist/crustyclaw-${{ matrix.target }}.tar.gz

  publish:
    needs: [bump, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          generate_release_notes: true
          files: artifacts/*.tar.gz
